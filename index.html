<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Job Scout Haarlem is an AI-powered recruiter discovery tool for in-house recruitment roles in the greater Haarlem area.">
  <title>Job Scout Haarlem</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Job Scout <em>Haarlem</em></div>
      <div class="header-sub">In-house recruitment roles · greater Haarlem area</div>
    </div>
    <div class="status-pill" id="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    
    <!-- API Key Configuration -->
    <div id="api-key-prompt">
      <label class="api-key-label">OpenAI API Key Required</label>
      <input 
        type="password" 
        class="api-key-input" 
        id="api-key-input" 
        placeholder="Enter your OpenAI API key"
        autocomplete="off"
      />
      <div class="api-key-actions">
        <button class="api-key-button" onclick="configureApiKey()">Configure</button>
        <button class="api-key-button secondary" onclick="clearConfiguredApiKey()">Clear stored key</button>
      </div>
      <div class="api-key-help">
        Get your API key from <a href="https://platform.openai.com/account/api-keys" target="_blank" style="color: var(--warn);">platform.openai.com</a>
      </div>
    </div>

    <div class="section-label">Target role titles</div>
    <div class="tags-wrap" id="roles-wrap"></div>
    <div class="tag-add-row">
      <input class="tag-input" id="role-input" placeholder="e.g. Talent Partner" autocomplete="off" />
      <button class="btn-add" onclick="appState.addRole()">Add</button>
    </div>

    <div class="section-label">Seed companies</div>
    <div class="seed-list" id="seed-list"></div>
    <div class="seed-add-row">
      <input class="tag-input" id="seed-input" placeholder="e.g. Dopper" style="flex:1" autocomplete="off"/>
      <button class="btn-add" onclick="appState.addSeed()">Add</button>
    </div>

    <div class="section-label">Search settings</div>
    <div class="config-row">
      <label class="config-label">Location focus</label>
      <input class="config-input" id="cfg-location" />
    </div>
    <div class="config-row">
      <label class="config-label">Min. company size</label>
      <select class="config-select" id="cfg-size">
        <option value="any">Any size</option>
        <option value="50+">50+ employees</option>
        <option value="100+">100+ employees</option>
        <option value="250+">250+ employees</option>
      </select>
    </div>
    <div class="config-row">
      <label class="config-label">Sectors to target</label>
      <input class="config-input" id="cfg-sectors" />
    </div>

    <button class="btn-run" id="btn-run" onclick="appState.runAgent()">Discover companies →</button>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Ready to scout</div>
      <div class="empty-desc">Configure your role titles and search settings, then hit <strong>Discover companies</strong> to start.</div>
    </div>
    <div id="results-area" style="display:none">
      <div class="log-stream" id="log-stream"></div>
      <div id="cards-container"></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="config/config.js"></script>
<script src="src/validation.js"></script>
<script src="src/fuzzy-match.js"></script>
<script src="src/storage.js"></script>
<script src="src/api.js"></script>
<script src="src/vacancies.js"></script>
<script src="src/ui.js"></script>
<script src="src/main.js"></script>

<script>
function configureApiKey() {
  const input = document.getElementById('api-key-input');
  if (input && input.value) {
    if (appState.setApiKey(input.value)) {
      input.value = '';
    }
  } else {
    ui.log('API key cannot be empty', 'err');
  }
}

function clearConfiguredApiKey() {
  if (!appState) return;
  appState.clearApiKey();
}

// Show API key prompt if needed
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    if (!config.hasApiKey()) {
      const prompt = document.getElementById('api-key-prompt');
      if (prompt) {
        prompt.classList.add('visible');
      }
    }
  }, 500);
});
</script>

</body>
</html>
